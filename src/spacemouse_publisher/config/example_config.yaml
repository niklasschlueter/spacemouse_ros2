# SpaceMouse Publisher — single robot configuration
#
# Each top-level key defines one SpaceMouse + pose integrator pair.
# All parameters except `namespace` and `device_path` are optional;
# the defaults shown here are the node defaults.

robot1:

  # ── Device ─────────────────────────────────────────────────────────────────

  # ROS 2 namespace. Must match the robot controller's namespace.
  namespace: ''

  # HID device path for the SpaceMouse (e.g. /dev/hidraw1).
  # Leave empty to auto-select the first detected device.
  device_path: ''

  # Set true if the operator faces the front of the robot base.
  # Set false if the operator faces the back (inverts X/Y axes so
  # "push forward" always moves the EE away from the operator).
  operator_position_front: true

  # Rotation applied to SpaceMouse inputs before EE/world-frame processing.
  # [roll, pitch, yaw] in degrees (intrinsic ZYX).
  # Examples:
  #   Operator sitting 90° to the left of the robot:  [0.0, 0.0, 90.0]
  #   Tool mounted 90° rotated relative to EE frame:  [0.0, 0.0, 90.0]
  input_frame_rpy: [0.0, 0.0, 0.0]

  # Per-axis sign flips applied after input_frame_rpy (no right-hand constraint).
  flip_input_x: false
  flip_input_y: false
  flip_input_z: false

  # ── Topics ─────────────────────────────────────────────────────────────────

  # Topic on which the robot publishes its current EE pose.
  current_pose_topic: "/current_pose"

  # Topic on which this node publishes the commanded target EE pose.
  target_pose_topic: "/target_pose"

  # ── Input frame ────────────────────────────────────────────────────────────

  # Reference frame for translational SpaceMouse inputs.
  #   "world" — pushing forward always moves the EE in the world +X direction.
  #   "ee"    — pushing forward moves the EE along its own pointing direction.
  translation_frame: "world"

  # Reference frame for rotational SpaceMouse inputs.
  #   "world" — rotating the puck tilts the EE around the world axes.
  #   "ee"    — rotating the puck tilts the EE around its own local axes.
  rotation_frame: "world"

  # ── Max offset ─────────────────────────────────────────────────────────────

  # SpaceMouse deflection maps directly to a pose offset from the actual EE.
  # Full deflection → max offset. Zero input → target at actual pose (no lag).

  # Maximum translational offset (m) at full SpaceMouse deflection.
  max_distance: 0.05

  # Maximum angular offset (rad) at full SpaceMouse deflection (~0.5 rad ≈ 28°).
  max_rotation: 0.2

  # When true, the target freezes at the actual pose on release (stable setpoint).
  # When false, the target continuously tracks the actual pose while idle.
  latch_on_idle: true

  # ── Controller-aware idle ─────────────────────────────────────────────────
  # When true (default), the node subscribes to the named ros2_control
  # controller's lifecycle transitions. While that controller is INACTIVE
  # (e.g. the robot is being homed via joint_trajectory_controller),
  # target_pose tracks the actual pose regardless of latch_on_idle —
  # preventing a stale setpoint jump when control switches back. When the
  # controller is ACTIVE, normal latch_on_idle behaviour applies. Set false
  # only if you aren't running under ros2_control.
  controller_aware: true
  controller_name: "cartesian_controller"
  controller_manager_node: "/controller_manager"

  # ── Deadband ───────────────────────────────────────────────────────────────

  # Minimum raw input (in the [-1, 1] range) required before any motion is
  # applied. Inputs below this are ignored; inputs above have the threshold
  # subtracted so motion starts smoothly from zero (no jump).
  linear_deadzone: 0.0

  # Same as linear_deadzone but for rotational axes.
  angular_deadzone: 0.0

  # ── Gripper ────────────────────────────────────────────────────────────────

  # How gripper commands are sent:
  #   "topic"  — publishes std_msgs/Float32 (range 0–1) to gripper_topic.
  #   "action" — sends control_msgs/action/GripperCommand goals directly to the
  #              gripper action server (e.g. ros2_control GripperActionController).
  gripper_interface: "action"

  # Topic on which gripper commands are published (topic mode only).
  gripper_topic: "space_mouse/target_gripper_width_percent"

  # Action server name for the gripper controller (action mode only).
  gripper_action: "manipulators/arm_0_gripper_controller/gripper_cmd"

  # Gripper joint position (radians) corresponding to fully closed.
  # Robotiq 2F-85: 0.8 rad. Adjust for your gripper model.
  gripper_max_position: 0.8

  # Maximum effort sent with every GripperCommand goal.
  gripper_max_effort: 50.0

  # Gripper button mode:
  #   "absolute" — one press fully opens (Button 1 → 0.0) or closes (Button 2 → 1.0).
  #   "relative" — hold Button 1 to open, hold Button 2 to close; release stops movement.
  gripper_mode: "absolute"

  # Gripper width step per timer tick in relative mode (range 0–1).
  # At 100 Hz: 0.01 → ~1 s full travel, 0.005 → ~2 s full travel.
  gripper_step: 0.01

  # ── Timing ─────────────────────────────────────────────────────────────────

  # Loop period in seconds (1 / Hz). Should match or be faster than the
  # SpaceMouse publisher rate (default 100 Hz = 0.01 s).
  timer_period: 0.01
